# Manual price seeds — operator-set fallbacks for games or items where no
# marketplace has reliable automated listings.
#
# Fields:
#   game         - EZLoot canonical game key (e.g. "destiny2", "osrs")
#   category     - EZLoot category (e.g. "carry", "gold", "items")
#   item_key     - item or service name (must match what the bot produces)
#   subkey       - optional: server/region/tier that disambiguates listings
#   min_price_usd - USD per unit (per-1-gold for gold, per-item for carries)
#   notes        - free-text explanation (not stored in DB)
#
# All prices are reviewed and updated manually. Add "notes" with the date
# and source for audit trail.

# ----- OSRS gold -----
# Now sourced live from G2G adapter (src/adapters/g2g.ts kind:"osrs_gold").
# Static seed kept only as a fallback if G2G is blocked/down for >48h.
# - game: osrs
#   category: gold
#   item_key: OSRS Gold
#   min_price_usd: 0.00000025
#   notes: "~$0.25/M; fallback if G2G unreachable"

# ----- Destiny 2 carries -----
# G2G lists Destiny 2 carries but category taxonomy is inconsistent.
# Seeded here so the bot can quote basic carries until a D2 adapter lands.
- game: destiny2
  category: carry
  item_key: Vault of the Mountain raid (Normal)
  min_price_usd: 25.00
  notes: "Operator-set 2026-05-20; check against G2G periodically"

- game: destiny2
  category: carry
  item_key: Vault of the Mountain raid (Master)
