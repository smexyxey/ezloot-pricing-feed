# Fly.io configuration for ezloot-pricing-feed.
# Deploy: fly deploy
# Logs:   fly logs

app = "ezloot-pricing-feed"
primary_region = "ord"   # Chicago — closest to most G2G edge nodes

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  SCRAPE_INTERVAL_MINUTES = "30"
  LOG_LEVEL = "info"
  # EZLOOT_IMPORT_URL and EZLOOT_IMPORT_TOKEN are secrets — set via:
  #   fly secrets set EZLOOT_IMPORT_TOKEN=<token>
  #   fly secrets set EZLOOT_IMPORT_URL=https://admin.ezloot.gg/api/admin/pricing-intel/import

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"

[vm]
  size = "shared-cpu-1x"
  memory = "256mb"
